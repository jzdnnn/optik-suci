services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        user: jzdnnn
        uid: 1000
    image: optik-app
    container_name: optik-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - optik-network

  web:
    image: nginx:alpine
    container_name: optik-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - optik-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: optik-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: optik_suci
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: jzdnnn
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - optik-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: optik-pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    networks:
      - optik-network
    depends_on:
      - db

networks:
  optik-network:
    driver: bridge

volumes:
  dbdata: